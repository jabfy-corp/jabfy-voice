<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jabfy-voice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 780px;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e2e;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #c4b5fd;
    }

    header .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    header .dot.listening { background: #f472b6; animation: pulse 1s infinite; }
    header .dot.thinking  { background: #facc15; animation: pulse 0.6s infinite; }
    header .dot.speaking  { background: #60a5fa; animation: pulse 0.8s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #status-label {
      font-size: 0.8rem;
      color: #6b7280;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 24px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 0.95rem;
      word-break: break-word;
      animation: fadein 0.25s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: #5b21b6;
      color: #ede9fe;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1e1e2e;
      color: #e8e8f0;
      border: 1px solid #2a2a3e;
      border-bottom-left-radius: 4px;
    }

    .msg .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 5px;
      opacity: 0.6;
    }

    #status-bar {
      width: 100%;
      max-width: 780px;
      padding: 14px 24px;
      border-top: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #6b7280;
      min-height: 52px;
    }

    #status-bar .wave {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    #status-bar .wave span {
      display: inline-block;
      width: 3px;
      height: 14px;
      background: #c4b5fd;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    #status-bar .wave span:nth-child(2) { animation-delay: 0.15s; }
    #status-bar .wave span:nth-child(3) { animation-delay: 0.3s; }
    #status-bar .wave span:nth-child(4) { animation-delay: 0.45s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); }
      50%       { transform: scaleY(1.4); }
    }

    .wave.hidden { visibility: hidden; }
  </style>
</head>
<body>

  <header>
    <div class="dot" id="dot"></div>
    <h1>jabfy-voice</h1>
    <span id="status-label">idle</span>
  </header>

  <div id="chat"></div>

  <div id="status-bar">
    <div class="wave hidden" id="wave">
      <span></span><span></span><span></span><span></span>
    </div>
    <span id="status-text">En attente...</span>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const dot = document.getElementById('dot');
    const statusLabel = document.getElementById('status-label');
    const statusText = document.getElementById('status-text');
    const wave = document.getElementById('wave');

    let lastCount = 0;

    const statusMessages = {
      idle:      'En attente...',
      listening: 'Écoute en cours...',
      thinking:  'Traitement en cours...',
      speaking:  'Réponse en cours...',
    };

    function renderMessages(messages) {
      if (messages.length === lastCount) return;
      const newMsgs = messages.slice(lastCount);
      newMsgs.forEach(m => {
        const div = document.createElement('div');
        div.className = `msg ${m.role}`;
        div.innerHTML = `<div class="label">${m.role === 'user' ? 'Vous' : 'Assistant'}</div>${escapeHtml(m.text)}`;
        chat.appendChild(div);
      });
      lastCount = messages.length;
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function poll() {
      try {
        const res = await fetch('/state');
        const data = await res.json();

        dot.className = `dot ${data.status}`;
        statusLabel.textContent = data.status;
        statusText.textContent = statusMessages[data.status] ?? data.status;
        wave.className = data.status === 'listening' ? 'wave' : 'wave hidden';

        renderMessages(data.messages);
      } catch (_) {}
      setTimeout(poll, 400);
    }

    poll();
  </script>
</body>
</html>
